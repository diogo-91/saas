[phases.setup]
nixPkgs = ['ffmpeg', 'nodejs_22']

[phases.install]
# Instala pnpm e usa na mesma camada Docker (mesmo RUN)
cmds = ['npm install -g pnpm@10.30.3 && pnpm install']

[phases.build]
# Usa o next diretamente do node_modules (sem precisar do pnpm no PATH)
cmds = ['node_modules/.bin/next build']

[start]
cmd = 'node_modules/.bin/next start'
